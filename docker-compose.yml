version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: job-portal-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: job-portal-server
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/job-portal
      CLIENT_URL: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build: ./client
    container_name: job-portal-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '5173:80'

volumes:
  mongo-data:
